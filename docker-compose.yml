services:

  reearth-visualizer-dev:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    environment:
      - SKIP_DOTENV=true
    env_file:
      - path: ./server/.env.docker
        required: false
    ports:
      - 8080:8080
    depends_on:
      reearth-mongo:
        condition: service_started
      reearth-gcs:
        condition: service_started
      reearth-accounts-api:
        condition: service_started
        required: false
    volumes:
      - ./server:/reearth-visualizer       # Mount source code for hot reload
      - /reearth-visualizer/tmp            # Exclude tmp directory
    networks:
      - reearth

  reearth-visualizer-internal-api:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    environment:
      - SKIP_DOTENV=true
      - REEARTH_VISUALIZER_INTERNALAPI_ACTIVE=true
    env_file:
      - path: ./server/.env.docker
        required: false
    ports:
      - 50051:50051
    depends_on:
      reearth-mongo:
        condition: service_started
      reearth-gcs:
        condition: service_started
    volumes:
      - ./server:/reearth-visualizer       # Mount source code for hot reload
      - /reearth-visualizer/tmp            # Exclude tmp directory
    networks:
      - reearth

  reearth-accounts-api:
    image: reearth/reearth-accounts-api:v1.3.1
    hostname: reearth-accounts-dev
    profiles:
      - accounts
    env_file:
      - path: ./server/.env.accounts.docker
        required: false
    ports:
      - 8090:8090
    depends_on:
      - reearth-mongo
      - reearth-cerbos
    networks:
      - reearth

  reearth-cerbos:
    image: cerbos/cerbos:0.51.0
    profiles:
      - accounts
    command: server --config=/policies/.cerbos.yaml
    ports:
      - 3593:3593
    volumes:
      - ./cerbos/policies:/policies
    networks:
      - reearth

  reearth-mongo:
    image: mongo:8.0
    hostname: reearth-mongo
    ports:
      - 27017:27017
    volumes:
      - ${PWD}/tmp/mongo:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: ["mongod", "--bind_ip_all", "--replSet", "rs0"]
    networks:
      - reearth

  reearth-gcs:
    image: fsouza/fake-gcs-server:1.54.0
    ports:
      - 4443:4443
    volumes:
      - ${PWD}/tmp/gcs:/storage
    command: -scheme http
    networks:
      - reearth

networks:
  reearth:
    name: reearth
