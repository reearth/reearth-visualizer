# Retags an already-built image under a new tag via a registry-side manifest
# copy (no rebuild, no pull/push of image layers). Used by stage.yml and
# release.yml to promote nightly -> rc -> a version tag without re-running CI.
name: promote-images
on:
  workflow_call:
    inputs:
      from_tag:
        type: string
        required: true
      to_tag:
        type: string
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Retag web image
        run: |
          docker buildx imagetools create \
            -t reearth/reearth-visualizer-web:${{ inputs.to_tag }} \
            reearth/reearth-visualizer-web:${{ inputs.from_tag }}
      - name: Retag server image
        run: |
          docker buildx imagetools create \
            -t reearth/reearth-visualizer-api:${{ inputs.to_tag }} \
            reearth/reearth-visualizer-api:${{ inputs.from_tag }}
